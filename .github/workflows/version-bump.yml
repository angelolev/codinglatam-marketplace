name: Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version-bump:
    runs-on: ubuntu-latest
    # Skip if the commit was made by this action (avoid infinite loop)
    if: "!contains(github.event.head_commit.message, 'chore(release):')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          tag=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$tag" ]; then
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
            echo "No previous tag found, starting from 0.0.0"
          else
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
            echo "Latest tag: $tag"
          fi

      - name: Determine bump type from commits
        id: bump
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --format="%s" HEAD)
          else
            COMMITS=$(git log --format="%s" "${LATEST_TAG}..HEAD")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"

          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -qi 'BREAKING CHANGE'; then
              BUMP="major"
              break
            elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
              BUMP="minor"
            elif echo "$msg" | grep -qE '^fix(\(.+\))?:' && [ "$BUMP" != "minor" ]; then
              BUMP="patch"
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            # Default to patch for non-conventional commits
            BUMP="patch"
          fi

          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump type: $BUMP"

      - name: Calculate new version
        if: steps.bump.outputs.skip != 'true'
        id: new_version
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.latest_tag.outputs.version }}"

          case "${{ steps.bump.outputs.type }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"
          echo "New version: ${major}.${minor}.${patch}"

      - name: Update plugin.json version
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"

          # Update marketplace plugin.json
          jq --arg v "$NEW_VERSION" '.version = $v' \
            plugins/codinglatam-toolkit/.claude-plugin/plugin.json > tmp.json \
            && mv tmp.json plugins/codinglatam-toolkit/.claude-plugin/plugin.json

      - name: Commit and tag
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/codinglatam-toolkit/.claude-plugin/plugin.json
          git commit -m "chore(release): v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push
          git push --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          gh release create "v${NEW_VERSION}" \
            --title "v${NEW_VERSION}" \
            --generate-notes
